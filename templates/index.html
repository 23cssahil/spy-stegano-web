<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevents zooming on mobile inputs to keep it feeling like a native app -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYPHER_STEG // Advanced Cryptography</title>
    <!-- Sci-fi and Monospace fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #030405;
            --cyber-green: #00ff66;
            --cyber-green-dim: rgba(0, 255, 102, 0.2);
            --cyber-blue: #00f0ff;
            --cyber-red: #ff003c;
            --panel-bg: rgba(6, 10, 15, 0.85);
            --glass-border: rgba(0, 255, 102, 0.3);
            --text-main: #e0f8ff;
            --font-head: 'Orbitron', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Prevents text selection on UI elements */
        }

        body {
            font-family: var(--font-mono);
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 15px;
        }

        /* Hacker Grid Background */
        .cyber-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
            transform: perspective(500px) rotateX(60deg) scale(2.5);
            transform-origin: center top;
            animation: moveGrid 15s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) scale(2.5) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) scale(2.5) translateY(30px); }
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            z-index: -1;
            pointer-events: none;
        }

        /* Main App Container */
        .hud-container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 0 20px rgba(0, 255, 102, 0.1), 
                inset 0 0 15px rgba(0, 255, 102, 0.05);
            position: relative;
            z-index: 10;
        }

        /* Cyberpunk corners */
        .hud-container::before, .hud-container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--cyber-green);
            pointer-events: none;
        }
        .hud-container::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .hud-container::after { bottom: -1px; right: -1px; border-left: none; border-top: none; box-shadow: 0 0 10px var(--cyber-green); }

        .hud-inner {
            padding: 25px 20px;
        }

        /* Glitch Header */
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(0, 255, 102, 0.2);
            padding-bottom: 15px;
            position: relative;
        }

        .header h1 {
            font-family: var(--font-head);
            font-size: 26px;
            font-weight: 900;
            color: var(--cyber-green);
            text-shadow: 0 0 10px var(--cyber-green), 0 0 20px rgba(0, 255, 102, 0.5);
            letter-spacing: 2px;
            margin-bottom: 5px;
            position: relative;
            display: inline-block;
        }

        /* Fake Glitch effect on hover */
        .header h1:hover {
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        .system-status {
            font-size: 11px;
            color: var(--cyber-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--cyber-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyber-green);
            margin-right: 5px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Tabs System */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 5px;
            background: transparent;
            border: 1px solid rgba(0, 255, 102, 0.2);
            color: var(--text-main);
            font-family: var(--font-head);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,102,0.2), transparent);
            transition: all 0.3s;
        }

        .tab-btn:hover::before { left: 100%; transition: all 0.5s; }

        .tab-btn.active {
            background: var(--cyber-green-dim);
            border-color: var(--cyber-green);
            color: var(--cyber-green);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.1);
        }

        .tab-content { display: none; }
        .tab-content.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.1, 1, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* High-Tech Form Elements */
        .form-group { margin-bottom: 20px; }

        .label-text {
            display: block;
            font-size: 10px;
            color: var(--cyber-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Radar Drop Area */
        .drop-zone {
            position: relative;
            border: 1px dashed var(--glass-border);
            background: rgba(0, 0, 0, 0.5);
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--cyber-green);
            background: rgba(0, 255, 102, 0.05);
        }

        .drop-zone input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 5;
        }

        .drop-icon {
            font-size: 28px;
            color: var(--cyber-green);
            margin-bottom: 10px;
            display: block;
            text-shadow: 0 0 10px var(--cyber-green);
        }

        .file-info {
            font-size: 12px;
            color: var(--text-main);
            word-break: break-all;
        }

        .file-preview {
            display: none;
            width: 100%;
            height: 140px;
            object-fit: cover;
            border: 1px solid var(--cyber-green);
            margin-bottom: 10px;
            filter: contrast(1.2) brightness(0.9);
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--cyber-green);
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 12px;
            resize: vertical;
            min-height: 90px;
            outline: none;
            transition: all 0.3s;
        }

        textarea:focus {
            border-color: var(--cyber-green);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
            background: rgba(0, 255, 102, 0.02);
        }

        textarea::placeholder {
            color: rgba(0, 255, 102, 0.3);
        }

        /* Action Buttons */
        .cyber-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--cyber-green);
            color: var(--cyber-green);
            font-family: var(--font-head);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 15px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cyber-btn:hover {
            background: var(--cyber-green);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
        }

        .cyber-btn.decode-btn {
            border-color: var(--cyber-blue);
            color: var(--cyber-blue);
        }

        .cyber-btn.decode-btn:hover {
            background: var(--cyber-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        /* Loader HUD */
        .loader-hud {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid #000;
            border-right: 2px solid #000;
            border-radius: 50%;
            animation: radar 1s linear infinite;
        }

        @keyframes radar {
            to { transform: rotate(360deg); }
        }

        /* Result Terminal */
        .terminal-box {
            display: none;
            margin-top: 20px;
            background: #000;
            border: 1px solid var(--cyber-green);
            padding: 15px;
            position: relative;
        }

        .terminal-box::before {
            content: 'sys_msg >';
            position: absolute;
            top: -9px; left: 10px;
            background: #000;
            padding: 0 5px;
            font-size: 10px;
            color: var(--cyber-green);
        }

        .terminal-box.error { border-color: var(--cyber-red); }
        .terminal-box.error::before { content: 'sys_err >'; color: var(--cyber-red); }

        .terminal-content {
            font-size: 13px;
            color: var(--cyber-green);
            word-wrap: break-word;
            user-select: text;
        }

        .terminal-box.error .terminal-content { color: var(--cyber-red); }

        /* Small Utilities */
        .action-link {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 15px;
            background: var(--cyber-green-dim);
            color: var(--cyber-green);
            text-decoration: none;
            font-size: 12px;
            border: 1px solid var(--cyber-green);
            text-transform: uppercase;
            transition: all 0.2s;
            cursor: pointer;
        }

        .action-link:hover {
            background: var(--cyber-green);
            color: #000;
        }

        /* Mobile specific adjustments to ensure it feels native */
        @media (max-width: 400px) {
            .hud-inner { padding: 20px 15px; }
            .header h1 { font-size: 22px; }
            .cyber-btn { font-size: 12px; padding: 12px; }
            .drop-zone { padding: 20px 10px; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div class="scanlines"></div>

    <div class="hud-container">
        <div class="hud-inner">
            
            <div class="header">
                <h1>CYPHER_STEG</h1>
                <div class="system-status">
                    <span class="status-dot"></span> SECURE CONNECTION ESTABLISHED
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('encode')">ENCRYPT [H]</button>
                <button class="tab-btn" onclick="switchTab('decode')">DECRYPT [E]</button>
            </div>

            <!-- ENCODE / ENCRYPT -->
            <div id="encode-tab" class="tab-content active">
                <form id="encodeForm">
                    <div class="form-group">
                        <span class="label-text">Select Target Image</span>
                        <div class="drop-zone" id="encodeDropArea">
                            <img id="encodePreview" class="file-preview" src="" alt="Target">
                            <span class="drop-icon" id="encodeIcon">⎈</span>
                            <div class="file-info" id="encodeFileText">DRAG OR TAP TO INJECT</div>
                            <input type="file" name="image" id="encodeInput" accept="image/*" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <span class="label-text">Classified Payload</span>
                        <textarea name="message" id="encodeMessage" placeholder="Input secret key/data..." required></textarea>
                    </div>
                    <button type="submit" class="cyber-btn" id="encodeSubmitBtn">
                        <span class="btn-text">INITIALIZE ENCRYPTION</span>
                        <div class="loader-hud" id="encodeLoader"></div>
                    </button>
                </form>

                <div class="terminal-box" id="encodeResult">
                    <div class="terminal-content" id="encodeResultMsg"></div>
                    <a href="#" class="action-link" id="downloadBtn" download>▼ DOWNLOAD ASSET</a>
                </div>
            </div>

            <!-- DECODE / DECRYPT -->
            <div id="decode-tab" class="tab-content">
                <form id="decodeForm">
                    <div class="form-group">
                        <span class="label-text">Select Encrypted Asset (PNG)</span>
                        <div class="drop-zone" id="decodeDropArea">
                            <img id="decodePreview" class="file-preview" src="" alt="Encrypted Asset">
                            <span class="drop-icon" id="decodeIcon" style="color: var(--cyber-blue); text-shadow: 0 0 10px var(--cyber-blue);">⎚</span>
                            <div class="file-info" id="decodeFileText">DRAG OR TAP TO SCAN</div>
                            <input type="file" name="image" id="decodeInput" accept="image/png, image/*" required>
                        </div>
                    </div>
                    <button type="submit" class="cyber-btn decode-btn" id="decodeSubmitBtn">
                        <span class="btn-text">RUN DECRYPTION SCAN</span>
                        <div class="loader-hud" id="decodeLoader"></div>
                    </button>
                </form>

                <div class="terminal-box" id="decodeResult">
                    <div class="terminal-content" id="decodedMessageText"></div>
                    <button type="button" class="action-link" style="border-color: var(--cyber-blue); color: var(--cyber-blue);" id="copyBtn" onclick="copyToClipboard()">[COPY DATA]</button>
                </div>
            </div>

        </div>
    </div>

<script>
    // System UI Functions
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tabId + '-tab').classList.add('active');

        // Clear terminals
        document.getElementById('encodeResult').style.display = 'none';
        document.getElementById('decodeResult').style.display = 'none';
    }

    // Advanced Drag/Drop & Preview Logic
    function setupFileInput(inputId, dropAreaId, previewId, iconId, textId) {
        const input = document.getElementById(inputId);
        const dropArea = document.getElementById(dropAreaId);
        const preview = document.getElementById(previewId);
        const icon = document.getElementById(iconId);
        const text = document.getElementById(textId);

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropArea.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        ['dragenter', 'dragover'].forEach(evt => {
            dropArea.addEventListener(evt, () => dropArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(evt => {
            dropArea.addEventListener(evt, () => dropArea.classList.remove('dragover'), false);
        });

        dropArea.addEventListener('drop', (e) => {
            input.files = e.dataTransfer.files;
            handleFiles(input.files);
        });

        input.addEventListener('change', function() { handleFiles(this.files); });

        function handleFiles(files) {
            if(files.length > 0) {
                const file = files[0];
                text.innerHTML = `TARGET_ACQUIRED:<br>[${file.name.substring(0,20)}...]`;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    icon.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }
    }

    setupFileInput('encodeInput', 'encodeDropArea', 'encodePreview', 'encodeIcon', 'encodeFileText');
    setupFileInput('decodeInput', 'decodeDropArea', 'decodePreview', 'decodeIcon', 'decodeFileText');

    function setLoading(btnId, loaderId, isLoading) {
        const btn = document.getElementById(btnId);
        const loader = document.getElementById(loaderId);
        const text = btn.querySelector('.btn-text');
        
        if (isLoading) {
            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'block';
            btn.style.background = btn.classList.contains('decode-btn') ? 'var(--cyber-blue)' : 'var(--cyber-green)';
        } else {
            btn.disabled = false;
            text.style.display = 'block';
            loader.style.display = 'none';
            btn.style.background = 'transparent';
        }
    }

    // Terminal Typewriter Effect
    function typeWriter(elementId, text, speed = 20) {
        const el = document.getElementById(elementId);
        el.innerHTML = '';
        let i = 0;
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    }

    function showTerminal(cardId, type, msg) {
        const card = document.getElementById(cardId);
        card.style.display = 'block';
        card.className = `terminal-box ${type}`;
        
        const contentId = cardId === 'encodeResult' ? 'encodeResultMsg' : 'decodedMessageText';
        typeWriter(contentId, msg);
        
        if (cardId === 'encodeResult' && type === 'success') {
            document.getElementById('downloadBtn').style.display = 'inline-block';
        } else if (cardId === 'encodeResult') {
            document.getElementById('downloadBtn').style.display = 'none';
        }

        if (cardId === 'decodeResult' && type === 'success') {
            document.getElementById('copyBtn').style.display = 'inline-block';
        } else if (cardId === 'decodeResult') {
            document.getElementById('copyBtn').style.display = 'none';
        }
    }

    // API Handling
    document.getElementById('encodeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        setLoading('encodeSubmitBtn', 'encodeLoader', true);
        document.getElementById('encodeResult').style.display = 'none';

        try {
            const res = await fetch('/encode', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.status === 'success') {
                document.getElementById('downloadBtn').href = data.download_url;
                document.getElementById('downloadBtn').download = data.filename;
                showTerminal('encodeResult', 'success', '> ENCRYPTION COMPLETE. DATA INJECTED. READY FOR DOWNLOAD.');
            } else {
                showTerminal('encodeResult', 'error', '> ERROR: ' + data.message);
            }
        } catch (error) {
            showTerminal('encodeResult', 'error', '> CRITICAL: CONNECTION SEVERED.');
        } finally {
            setLoading('encodeSubmitBtn', 'encodeLoader', false);
        }
    });

    document.getElementById('decodeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        
        setLoading('decodeSubmitBtn', 'decodeLoader', true);
        document.getElementById('decodeResult').style.display = 'none';

        try {
            const res = await fetch('/decode', { method: 'POST', body: formData });
            const data = await res.json();

            if (data.status === 'success') {
                showTerminal('decodeResult', 'success', '> PAYLOAD DECRYPTED: \n' + data.secret_message);
            } else {
                showTerminal('decodeResult', 'error', '> ERROR: ' + data.message);
            }
        } catch (error) {
            showTerminal('decodeResult', 'error', '> CRITICAL: SCAN FAILED.');
        } finally {
            setLoading('decodeSubmitBtn', 'decodeLoader', false);
        }
    });

    // Copy Tool
    function copyToClipboard() {
        // Extract just the payload text, removing the "> PAYLOAD DECRYPTED: \n" part
        const fullText = document.getElementById('decodedMessageText').innerText;
        const textToCopy = fullText.replace('> PAYLOAD DECRYPTED: \n', '');
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '[COPIED TO CLIPBOARD]';
            btn.style.background = 'var(--cyber-blue)';
            btn.style.color = '#000';
            setTimeout(() => { 
                btn.innerHTML = originalText; 
                btn.style.background = 'transparent';
                btn.style.color = 'var(--cyber-blue)';
            }, 2000);
        });
    }
</script>
</body>
</html>
